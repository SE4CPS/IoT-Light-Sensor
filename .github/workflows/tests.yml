name: CI Pipeline

on:
  push:
    branches: [production]
  pull_request:
    branches: [production]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dashboard deps
        run: pip install -r dashboard/requirements.txt

      - name: Install twin deps
        run: pip install -r twin/requirements.txt

      - name: Install pytest
        run: pip install pytest

      - name: Run dashboard tests
        run: pytest dashboard/tests/

      - name: Run twin tests
        run: pytest twin/test_twin_sim.py