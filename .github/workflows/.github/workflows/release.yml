name: Production Release

on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next tag from production history
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          LAST_TAG="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
          fi

          VERSION="${LAST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"

          NEXT_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "next_tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag on production HEAD
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "${{ steps.version.outputs.next_tag }}"
          git push origin "${{ steps.version.outputs.next_tag }}"

      - name: Create GitHub Release with auto notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          previous_tag: ${{ steps.version.outputs.last_tag }}
